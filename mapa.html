<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactivo | CityGisMap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .map-container { height: calc(100vh - 80px); width: 100%; border: none; }
        .btn-back:hover { color: #4A90E2; }
    </style>
</head>
<body class="bg-white">
    <!-- Navegación Superior -->
    <header class="bg-white shadow-sm h-[80px] flex items-center relative z-50">
        <nav class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="./index.html" class="btn-back flex items-center font-bold text-gray-700 transition-colors">
                    <span class="mr-2">←</span> Inicio
                </a>
                <div class="h-6 w-[1px] bg-gray-200"></div>
                <img src="logo-transparente.png" alt="CityGisMap logo" class="h-8">
            </div>
            <div class="hidden sm:block">
                <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Visor Geográfico Municipal</p>
            </div>
            <div>
                <a href="./fernandez.html" class="text-sm font-bold text-[#4A90E2] hover:underline">Ver Reporte Técnico</a>
            </div>
        </nav>
    </header>

    <!-- El Mapa -->
    <!-- Se integra el mapa externo mediante un iframe que ocupa todo el espacio restante -->
    <iframe 
        src="http://186.121.172.6:8080/geoserver/www/munifernandez.html" 
        class="map-container"
        allowfullscreen>
    </iframe>

</body>
</html>
